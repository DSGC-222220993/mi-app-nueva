<div class="contact-form-container">
  <h1>Contáctanos</h1>
  <form #contactForm="ngForm" (ngSubmit)="enviarFormulario()">
    
    <div class="form-group">
      <label for="email">Correo Electrónico:</label>
      <input 
        type="email" 
        id="email" 
        name="email" 
        [(ngModel)]="contacto.email"
        placeholder="ejemplo@gmail.com" 
        pattern=".+@(gmail\.com|hotmail\.com|outlook\.com)" 
        title="Solo se permiten correos de Gmail, Hotmail o Outlook"
        required>
    </div>

    <div class="form-group">
      <label for="message">Mensaje (5 - 500 caracteres):</label>
      <textarea 
        id="message" 
        name="message" 
        [(ngModel)]="contacto.message"
        rows="5" 
        minlength="5"
        maxlength="500" 
        placeholder="Escribe tu mensaje aquí..."
        required></textarea>
      
      <div id="charCount">
        <small [style.color]="contacto.message.length < 5 ? 'red' : '#8b5e3c'">
          {{ contacto.message.length }} / 500 (Mínimo 5)
        </small>
      </div>
    </div>

    <button type="submit" [disabled]="!contactForm.form.valid" class="submit-btn">
      Enviar Mensaje
    </button>
  </form>
</div>
